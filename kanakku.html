<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kanakku — Income & Expense Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --paper:#EEF0E8;
    --paper-raised:#F7F8F3;
    --ink:#1C2420;
    --ink-soft:#5B6259;
    --line:#C9CEC0;
    --line-soft:#DBDECF;
    --forest:#1F4B3F;
    --forest-deep:#123128;
    --brass:#AD7F35;
    --brass-soft:#E9DAB8;
    --rust:#A13F2E;
    --rust-soft:#F1DAD3;
    --sage:#7C8B72;
    --radius:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    padding-bottom:60px;
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 14px;}

  header{
    padding:22px 0 18px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:14px;
    border-bottom:2px solid var(--forest);
  }
  .brand-title{
    font-family:'Zilla Slab',serif;
    font-weight:700;
    font-size:26px;
    color:var(--forest-deep);
    letter-spacing:0.3px;
    margin:0;
  }
  .brand-sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:2px;
    letter-spacing:0.3px;
  }
  .stamp{
    width:100px;height:100px;border-radius:50%;
    border:3px solid var(--forest);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transform:rotate(-6deg);
    position:relative;
    flex-shrink:0;
  }
  .stamp::before{
    content:"";
    position:absolute; inset:6px;
    border:1px dashed var(--forest);
    border-radius:50%;
  }
  .stamp .lbl{font-size:8.5px;letter-spacing:1.2px;color:var(--forest);text-transform:uppercase;font-weight:600;}
  .stamp .amt{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--forest-deep);margin-top:2px;}
  .stamp.neg{border-color:var(--rust);}
  .stamp.neg::before{border-color:var(--rust);}
  .stamp.neg .lbl,.stamp.neg .amt{color:var(--rust);}

  .summary{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin:18px 0;
  }
  .sumcard{
    background:var(--paper-raised);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    padding:12px 10px;
  }
  .sumcard .lbl{font-size:10.5px;color:var(--ink-soft);letter-spacing:0.2px;}
  .sumcard .val{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;margin-top:4px;word-break:break-all;}
  .sumcard.income .val{color:var(--forest);}
  .sumcard.expense .val{color:var(--rust);}
  .sumcard.balance .val{color:var(--ink);}

  .panel{
    background:var(--paper-raised);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:16px;
  }
  .panel h2{
    font-family:'Zilla Slab',serif;
    font-size:16px;
    font-weight:600;
    margin:0 0 14px;
    color:var(--forest-deep);
    display:flex;align-items:center;gap:8px;
  }
  .panel h2::before{content:"";width:5px;height:15px;background:var(--brass);display:inline-block;border-radius:2px;}

  .toggle{
    display:flex;border:1px solid var(--forest);border-radius:8px;overflow:hidden;width:100%;margin-bottom:16px;
  }
  .toggle button{
    flex:1;
    padding:11px 8px;border:none;background:transparent;font-family:'Inter';font-size:14px;font-weight:600;cursor:pointer;color:var(--forest);min-height:44px;
  }
  .toggle button.active{background:var(--forest);color:#fff;}
  .toggle button.expense-active{background:var(--rust);color:#fff;}
  .toggle button:nth-child(2){border-left:1px solid var(--forest);}

  .pillrow{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:4px;
    margin-bottom:12px;
    -webkit-overflow-scrolling:touch;
  }
  .pillrow::-webkit-scrollbar{height:4px;}
  .pill{
    flex:0 0 auto;
    padding:10px 16px;
    border-radius:20px;
    border:1px solid var(--line);
    background:#fff;
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    white-space:nowrap;
    min-height:40px;
  }
  .pill.active{background:var(--forest);border-color:var(--forest);color:#fff;}
  .pill.active.expense-pill{background:var(--rust);border-color:var(--rust);}

  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .form-grid .full{grid-column:1/-1;}
  label{font-size:11px;color:var(--ink-soft);letter-spacing:0.3px;display:block;margin-bottom:5px;text-transform:uppercase;}
  input,select,button.action,textarea{
    font-family:'Inter';
    font-size:16px;
    padding:11px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    background:#fff;
    color:var(--ink);
    width:100%;
    min-height:44px;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--brass);outline-offset:1px;border-color:var(--brass);}
  .add-btn{
    margin-top:14px;
    background:var(--forest);
    color:#fff;
    border:none;
    font-weight:600;
    font-size:15px;
    padding:13px 22px;
    border-radius:8px;
    cursor:pointer;
    width:100%;
    min-height:48px;
  }
  .add-btn.expense{background:var(--rust);}
  .add-btn:active{filter:brightness(1.1);}

  .filters{display:flex;gap:10px;flex-wrap:wrap;}
  .filters > div{min-width:130px;flex:1 1 130px;}

  .ledger{border-top:1px solid var(--line-soft);}
  .row{
    display:grid;
    grid-template-columns:1fr auto 32px;
    align-items:center;
    gap:8px;
    padding:12px 4px;
    border-bottom:1px dashed var(--line);
    font-size:13.5px;
  }
  .row .date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);display:block;}
  .row .desc .maincat{font-weight:600;}
  .row .desc .subcat{color:var(--ink-soft);font-size:12px;}
  .row .desc .note{color:var(--sage);font-size:12px;display:block;font-style:italic;}
  .row .amt{font-family:'IBM Plex Mono',monospace;font-weight:600;text-align:right;white-space:nowrap;}
  .row .amt.income{color:var(--forest);}
  .row .amt.expense{color:var(--rust);}
  .row .del{
    background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:18px;padding:6px;width:100%;min-height:32px;
  }
  .row .del:active{color:var(--rust);}
  .empty{padding:30px 10px;text-align:center;color:var(--ink-soft);font-size:13.5px;}
  .cattag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-right:6px;letter-spacing:0.2px;text-transform:uppercase;}
  .tag-wants{background:#F1DAD3;color:#A13F2E;}
  .tag-needs{background:#DCE7D5;color:#1F4B3F;}
  .tag-investment{background:#E9DAB8;color:#8A5F1E;}
  .tag-credit{background:#DDE3EE;color:#33507A;}
  .tag-charity{background:#EADCF0;color:#6B3E85;}
  .tag-income{background:#DCE7D5;color:#1F4B3F;}

  .chart-tabs{display:flex;gap:8px;margin-bottom:14px;}
  .chart-tabs button{
    background:transparent;border:1px solid var(--line);padding:8px 14px;border-radius:20px;font-size:12.5px;cursor:pointer;color:var(--ink-soft);font-family:'Inter';font-weight:600;min-height:38px;
  }
  .chart-tabs button.active{background:var(--brass-soft);border-color:var(--brass);color:var(--brass);}
  .charts-grid{display:grid;grid-template-columns:1fr;gap:20px;}
  .chart-box{position:relative;height:230px;}

  .export-row{display:flex;gap:10px;flex-wrap:wrap;}
  .export-btn{
    flex:1 1 140px;
    background:#fff;border:1px solid var(--forest);color:var(--forest);
    font-weight:600;font-size:13.5px;padding:12px;border-radius:8px;cursor:pointer;min-height:46px;
  }
  .export-btn:active{background:var(--forest);color:#fff;}

  footer{text-align:center;color:var(--ink-soft);font-size:11px;margin-top:16px;letter-spacing:0.2px;padding:0 8px;}

  @media(min-width:640px){
    .wrap{padding:0 18px;}
    .charts-grid{grid-template-columns:1.3fr 1fr;}
    .row{grid-template-columns:78px 1fr 110px 34px;}
    .row .date{font-size:12px;}
  }

  #lockScreen{
    position:fixed; inset:0; background:var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:999; padding:20px;
  }
  .lock-stamp{
    width:100px;height:100px;border-radius:50%;border:3px solid var(--forest);
    display:flex;align-items:center;justify-content:center;transform:rotate(-6deg);
    margin-bottom:26px; position:relative;
  }
  .lock-stamp::before{content:"";position:absolute;inset:6px;border:1px dashed var(--forest);border-radius:50%;}
  .lock-stamp i{font-family:'Zilla Slab',serif;font-weight:700;font-size:15px;color:var(--forest-deep);}
  .lock-title{font-family:'Zilla Slab',serif;font-size:20px;font-weight:600;color:var(--forest-deep);margin:0 0 4px;}
  .lock-sub{font-size:12.5px;color:var(--ink-soft);margin:0 0 22px;}
  .pin-dots{display:flex;gap:14px;margin-bottom:20px;}
  .pin-dots span{width:14px;height:14px;border-radius:50%;border:2px solid var(--forest);background:transparent;}
  .pin-dots span.filled{background:var(--forest);}
  .pin-pad{display:grid;grid-template-columns:repeat(3,64px);gap:12px;}
  .pin-pad button{
    width:64px;height:64px;border-radius:50%;border:1px solid var(--line);background:#fff;
    font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--ink);cursor:pointer;
  }
  .pin-pad button:active{background:var(--forest);color:#fff;}
  .pin-pad button.wide{grid-column:span 1;font-size:13px;font-family:'Inter';}
  .pin-error{color:var(--rust);font-size:12.5px;margin-top:14px;min-height:16px;}
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-stamp"><i>K</i></div>
  <p class="lock-title">Kanakku is locked</p>
  <p class="lock-sub">Enter your 4-digit PIN</p>
  <div class="pin-dots" id="pinDots">
    <span></span><span></span><span></span><span></span>
  </div>
  <div class="pin-pad" id="pinPad"></div>
  <p class="pin-error" id="pinError"></p>
</div>

<div class="wrap">

  <header>
    <div>
      <p class="brand-title">Kanakku</p>
      <p class="brand-sub">Personal income &amp; expense ledger</p>
      <p class="brand-sub" id="syncStatus" style="margin-top:1px;font-weight:600;">Loading...</p>
    </div>
    <div class="stamp" id="stamp">
      <span class="lbl">Balance</span>
      <span class="amt" id="stampAmt">₹0</span>
    </div>
  </header>

  <div class="summary">
    <div class="sumcard income">
      <div class="lbl">Income (mo)</div>
      <div class="val" id="sumIncome">₹0</div>
    </div>
    <div class="sumcard expense">
      <div class="lbl">Expense (mo)</div>
      <div class="val" id="sumExpense">₹0</div>
    </div>
    <div class="sumcard balance">
      <div class="lbl">Net (mo)</div>
      <div class="val" id="sumNet">₹0</div>
    </div>
  </div>

  <div class="panel">
    <h2>Add entry</h2>
    <div class="toggle">
      <button id="typeIncomeBtn" class="active" onclick="setType('income')">Income</button>
      <button id="typeExpenseBtn" onclick="setType('expense')">Expense</button>
    </div>

    <div id="categoryPillWrap">
      <label>Category</label>
      <div class="pillrow" id="categoryPills"></div>
    </div>

    <div class="form-grid">
      <div class="full" id="subcatWrap">
        <label>Sub-category</label>
        <input type="text" id="fSubcat" list="subcatOptions" placeholder="e.g. Bike petrol, or type your own">
        <datalist id="subcatOptions"></datalist>
      </div>
      <div>
        <label>Amount (₹)</label>
        <input type="number" id="fAmount" min="0" step="0.01" inputmode="decimal" placeholder="0.00">
      </div>
      <div>
        <label>Date</label>
        <input type="date" id="fDate">
      </div>
      <div class="full">
        <label>Remark</label>
        <input type="text" id="fNote" placeholder="Any extra detail (optional)">
      </div>
    </div>
    <button class="add-btn" id="addBtn" onclick="addEntry()">Add entry</button>
  </div>

  <div class="panel">
    <h2>Ledger</h2>
    <div class="filters" style="margin-bottom:14px;">
      <div>
        <label>Month</label>
        <input type="month" id="filterMonth">
      </div>
      <div>
        <label>Type</label>
        <select id="filterType">
          <option value="all">All</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div>
        <label>Category</label>
        <select id="filterCategory"><option value="all">All</option></select>
      </div>
      <div>
        <label>Search</label>
        <input type="text" id="filterSearch" placeholder="Sub-category or remark...">
      </div>
    </div>
    <div class="ledger" id="ledgerBody"></div>
  </div>

  <div class="panel">
    <h2>Reports</h2>
    <div class="chart-tabs">
      <button id="tabMonthly" class="active" onclick="setChartRange('monthly')">Monthly trend</button>
      <button id="tabYearly" onclick="setChartRange('yearly')">Yearly trend</button>
    </div>
    <div class="charts-grid">
      <div class="chart-box"><canvas id="trendChart"></canvas></div>
      <div class="chart-box"><canvas id="catChart"></canvas></div>
    </div>
  </div>

  <div class="panel">
    <h2>Export</h2>
    <div class="export-row">
      <button class="export-btn" onclick="exportExcel()">Download Excel (.xlsx)</button>
      <button class="export-btn" onclick="exportPDF()">Download PDF</button>
    </div>
  </div>

  <footer>Data is saved privately in this browser only (localStorage). Nothing is uploaded anywhere.</footer>
</div>

<script>
const APP_PIN = "1341";
const UNLOCK_KEY = "kanakku_unlocked";
let pinBuffer = "";

function renderPinPad(){
  const keys = ["1","2","3","4","5","6","7","8","9","","0","del"];
  document.getElementById('pinPad').innerHTML = keys.map(k=>{
    if(k==="") return `<div></div>`;
    if(k==="del") return `<button class="wide" onclick="pinBackspace()">Del</button>`;
    return `<button onclick="pinPress('${k}')">${k}</button>`;
  }).join('');
}
function updatePinDots(){
  const dots = document.querySelectorAll('#pinDots span');
  dots.forEach((d,i)=> d.classList.toggle('filled', i < pinBuffer.length));
}
function pinPress(digit){
  if(pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  document.getElementById('pinError').textContent = '';
  if(pinBuffer.length === 4){
    setTimeout(checkPin, 150);
  }
}
function pinBackspace(){
  pinBuffer = pinBuffer.slice(0,-1);
  updatePinDots();
}
function checkPin(){
  if(pinBuffer === APP_PIN){
    sessionStorage.setItem(UNLOCK_KEY, "1");
    document.getElementById('lockScreen').style.display = 'none';
  } else {
    document.getElementById('pinError').textContent = 'Wrong PIN, try again.';
    pinBuffer = '';
    updatePinDots();
  }
}
renderPinPad();
if(sessionStorage.getItem(UNLOCK_KEY) === "1"){
  document.getElementById('lockScreen').style.display = 'none';
}

const INCOME_CATS = ["Salary","Tuition Income","Business","Investment Return","Gift","Other Income"];
const EXPENSE_CATS = ["Wants","Needs","Investment","Credit","Charity"];
const DEFAULT_SUBCATS = ["Bike petrol","Car petrol","Grocery and veg","KSEB bill"];
const TAG_CLASS = {
  "Wants":"tag-wants","Needs":"tag-needs","Investment":"tag-investment","Credit":"tag-credit","Charity":"tag-charity"
};

let currentType = 'income';
let currentCategory = INCOME_CATS[0];
let chartRange = 'monthly';
let trendChart, catChart;
const STORAGE_KEY = 'kanakku_entries_v2';
const SUBCAT_KEY = 'kanakku_subcats_v1';

function loadJSON(key, fallback){
  try{ const v = JSON.parse(localStorage.getItem(key)); return v || fallback; }
  catch(e){ return fallback; }
}
function saveJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

const GSHEET_URL = "https://script.google.com/macros/s/AKfycbxzlBFVVnH1JTcMAFDknef2si1EiidFyDq64stuO0TA0tjm98ldF-usgW-yRdaKvAW2zQ/exec";
const CACHE_KEY = "kanakku_cache_v1";

let entries = loadJSON(CACHE_KEY, loadJSON(STORAGE_KEY, []));
let customSubcats = loadJSON(SUBCAT_KEY, []);

function setSyncStatus(text, color){
  const el = document.getElementById('syncStatus');
  if(el){ el.textContent = text; el.style.color = color || 'var(--ink-soft)'; }
}

async function fetchEntries(){
  setSyncStatus('Syncing...', 'var(--brass)');
  try{
    const res = await fetch(GSHEET_URL, { method: 'GET' });
    const data = await res.json();
    entries = data.map(e => ({ ...e, amount: Number(e.amount) }));
    saveJSON(CACHE_KEY, entries);
    setSyncStatus('Synced to Google Sheet', 'var(--forest)');
  }catch(err){
    setSyncStatus('Offline — showing last saved data', 'var(--rust)');
  }
  renderAll();
}

async function pushAdd(entry){
  try{
    await fetch(GSHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'add', ...entry })
    });
    setSyncStatus('Synced to Google Sheet', 'var(--forest)');
  }catch(err){
    setSyncStatus('Could not reach sheet — will look out of sync', 'var(--rust)');
  }
}

async function pushDelete(id){
  try{
    await fetch(GSHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'delete', id })
    });
    setSyncStatus('Synced to Google Sheet', 'var(--forest)');
  }catch(err){
    setSyncStatus('Could not reach sheet — will look out of sync', 'var(--rust)');
  }
}

function allSubcats(){
  return [...new Set([...DEFAULT_SUBCATS, ...customSubcats])];
}

function fmt(n){
  return '₹' + Number(n||0).toLocaleString('en-IN', {maximumFractionDigits:2});
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function monthStr(d){ return d.slice(0,7); }

function setType(t){
  currentType = t;
  document.getElementById('typeIncomeBtn').classList.toggle('active', t==='income');
  document.getElementById('typeExpenseBtn').classList.toggle('active', t==='expense');
  document.getElementById('typeExpenseBtn').classList.toggle('expense-active', t==='expense');
  document.getElementById('addBtn').classList.toggle('expense', t==='expense');
  document.getElementById('subcatWrap').style.display = t==='expense' ? 'block' : 'none';
  currentCategory = (t==='income' ? INCOME_CATS : EXPENSE_CATS)[0];
  renderCategoryPills();
}

function renderCategoryPills(){
  const cats = currentType==='income' ? INCOME_CATS : EXPENSE_CATS;
  const wrap = document.getElementById('categoryPills');
  wrap.innerHTML = cats.map(c=>`
    <button type="button" class="pill ${c===currentCategory?'active':''} ${currentType==='expense'?'expense-pill':''}" data-cat="${c}" onclick="selectCategory('${c.replace(/'/g,"\\'")}')">${c}</button>
  `).join('');
}
function selectCategory(c){
  currentCategory = c;
  renderCategoryPills();
}

function refreshSubcatDatalist(){
  document.getElementById('subcatOptions').innerHTML =
    allSubcats().map(s=>`<option value="${s}">`).join('');
}

function populateFilterCategory(){
  const all = [...INCOME_CATS, ...EXPENSE_CATS];
  const sel = document.getElementById('filterCategory');
  sel.innerHTML = '<option value="all">All</option>' + all.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function addEntry(){
  const amount = parseFloat(document.getElementById('fAmount').value);
  const date = document.getElementById('fDate').value || todayStr();
  const note = document.getElementById('fNote').value.trim();
  const subcat = currentType==='expense' ? document.getElementById('fSubcat').value.trim() : '';

  if(!amount || amount <= 0){
    alert('Enter a valid amount.');
    return;
  }
  if(currentType==='expense' && subcat && !allSubcats().includes(subcat)){
    customSubcats.push(subcat);
    saveJSON(SUBCAT_KEY, customSubcats);
    refreshSubcatDatalist();
  }
  const newEntry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    type: currentType,
    category: currentCategory,
    subcategory: subcat,
    amount, date, note
  };
  entries.push(newEntry);
  saveJSON(CACHE_KEY, entries);
  document.getElementById('fAmount').value='';
  document.getElementById('fNote').value='';
  document.getElementById('fSubcat').value='';
  renderAll();
  pushAdd(newEntry);
}

function deleteEntry(id){
  entries = entries.filter(e=>e.id!==id);
  saveJSON(CACHE_KEY, entries);
  renderAll();
  pushDelete(id);
}

function getFiltered(){
  const month = document.getElementById('filterMonth').value;
  const type = document.getElementById('filterType').value;
  const cat = document.getElementById('filterCategory').value;
  const q = document.getElementById('filterSearch').value.trim().toLowerCase();
  return entries.filter(e=>{
    if(month && monthStr(e.date) !== month) return false;
    if(type !== 'all' && e.type !== type) return false;
    if(cat !== 'all' && e.category !== cat) return false;
    if(q){
      const hay = ((e.subcategory||'') + ' ' + (e.note||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b)=> b.date.localeCompare(a.date));
}

function renderLedger(){
  const list = getFiltered();
  const body = document.getElementById('ledgerBody');
  if(list.length === 0){
    body.innerHTML = '<div class="empty">No entries yet. Add your first one above.</div>';
    return;
  }
  body.innerHTML = list.map(e=>{
    const tagClass = e.type==='income' ? 'tag-income' : (TAG_CLASS[e.category] || 'tag-needs');
    return `
    <div class="row">
      <div>
        <span class="date">${e.date}</span>
        <div class="desc">
          <span class="cattag ${tagClass}">${e.category}</span>
          ${e.subcategory?`<span class="subcat">${escapeHtml(e.subcategory)}</span>`:''}
          ${e.note?`<span class="note">${escapeHtml(e.note)}</span>`:''}
        </div>
      </div>
      <div class="amt ${e.type}">${e.type==='expense'?'-':'+'}${fmt(e.amount)}</div>
      <button class="del" onclick="deleteEntry('${e.id}')" aria-label="Delete entry">✕</button>
    </div>
  `;
  }).join('');
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderSummary(){
  const now = new Date();
  const curMonth = now.toISOString().slice(0,7);
  const monthEntries = entries.filter(e=>monthStr(e.date)===curMonth);
  const income = monthEntries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const expense = monthEntries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  document.getElementById('sumIncome').textContent = fmt(income);
  document.getElementById('sumExpense').textContent = fmt(expense);
  document.getElementById('sumNet').textContent = fmt(income-expense);

  const totalIncome = entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const totalExpense = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const balance = totalIncome - totalExpense;
  document.getElementById('stampAmt').textContent = fmt(balance);
  document.getElementById('stamp').classList.toggle('neg', balance < 0);
}

function setChartRange(r){
  chartRange = r;
  document.getElementById('tabMonthly').classList.toggle('active', r==='monthly');
  document.getElementById('tabYearly').classList.toggle('active', r==='yearly');
  renderCharts();
}

function renderCharts(){
  const ctx1 = document.getElementById('trendChart').getContext('2d');
  const ctx2 = document.getElementById('catChart').getContext('2d');

  let labels = [], incomeData = [], expenseData = [];
  if(chartRange === 'monthly'){
    const now = new Date();
    for(let i=11;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const key = d.toISOString().slice(0,7);
      labels.push(d.toLocaleString('en-IN',{month:'short', year:'2-digit'}));
      incomeData.push(entries.filter(e=>e.type==='income' && monthStr(e.date)===key).reduce((s,e)=>s+e.amount,0));
      expenseData.push(entries.filter(e=>e.type==='expense' && monthStr(e.date)===key).reduce((s,e)=>s+e.amount,0));
    }
  } else {
    const years = [...new Set(entries.map(e=>e.date.slice(0,4)))].sort();
    const useYears = years.length ? years : [new Date().getFullYear().toString()];
    labels = useYears;
    incomeData = useYears.map(y=>entries.filter(e=>e.type==='income' && e.date.slice(0,4)===y).reduce((s,e)=>s+e.amount,0));
    expenseData = useYears.map(y=>entries.filter(e=>e.type==='expense' && e.date.slice(0,4)===y).reduce((s,e)=>s+e.amount,0));
  }

  if(trendChart) trendChart.destroy();
  trendChart = new Chart(ctx1, {
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Income', data:incomeData, backgroundColor:'#1F4B3F', borderRadius:3},
        {label:'Expense', data:expenseData, backgroundColor:'#A13F2E', borderRadius:3}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:'bottom', labels:{boxWidth:10, font:{size:11}}}},
      scales:{ x:{grid:{display:false}}, y:{grid:{color:'#DBDECF'}, ticks:{callback:v=>'₹'+v}} }
    }
  });

  const catTotals = {};
  entries.filter(e=>e.type==='expense').forEach(e=>{
    catTotals[e.category] = (catTotals[e.category]||0) + e.amount;
  });
  const catLabels = Object.keys(catTotals);
  const catValues = Object.values(catTotals);
  const palette = {"Wants":"#A13F2E","Needs":"#1F4B3F","Investment":"#AD7F35","Credit":"#33507A","Charity":"#6B3E85"};

  if(catChart) catChart.destroy();
  catChart = new Chart(ctx2, {
    type:'doughnut',
    data:{
      labels: catLabels.length ? catLabels : ['No expenses yet'],
      datasets:[{
        data: catValues.length ? catValues : [1],
        backgroundColor: catLabels.length ? catLabels.map(c=>palette[c]||'#7C8B72') : ['#DBDECF'],
        borderWidth:2, borderColor:'#F7F8F3'
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:'bottom', labels:{boxWidth:10, font:{size:10}}}}
    }
  });
}

function exportExcel(){
  const data = entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(e=>({
    Date: e.date, Type: e.type, Category: e.category, "Sub-category": e.subcategory||'', Amount: e.amount, Remark: e.note||''
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Ledger');
  XLSX.writeFile(wb, `kanakku_ledger_${todayStr()}.xlsx`);
}

function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text('Kanakku - Income & Expense Ledger', 14, 16);
  doc.setFontSize(10);
  doc.text(`Generated on ${todayStr()}`, 14, 22);
  const rows = entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(e=>[
    e.date, e.type, e.category, e.subcategory||'', (e.type==='expense'?'-':'+')+fmt(e.amount).replace('₹',''), e.note||''
  ]);
  doc.autoTable({
    head: [['Date','Type','Category','Sub-category','Amount (Rs)','Remark']],
    body: rows,
    startY: 28,
    styles:{fontSize:8},
    headStyles:{fillColor:[31,75,63]}
  });
  doc.save(`kanakku_ledger_${todayStr()}.pdf`);
}

function renderAll(){
  renderSummary();
  renderLedger();
  renderCharts();
}

document.getElementById('filterMonth').addEventListener('change', renderLedger);
document.getElementById('filterType').addEventListener('change', renderLedger);
document.getElementById('filterCategory').addEventListener('change', renderLedger);
document.getElementById('filterSearch').addEventListener('input', renderLedger);

document.getElementById('fDate').value = todayStr();
document.getElementById('subcatWrap').style.display = 'none';
renderCategoryPills();
refreshSubcatDatalist();
populateFilterCategory();
renderAll();
fetchEntries();
</script>
